name: Build Android APK Cloud Pro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Inisialisasi Proyek & Aset Web
      run: |
        mkdir -p www
        if [ -f index.html ]; then
          cp index.html www/
        else
          echo "ERROR: File index.html tidak ditemukan!"
          exit 1
        fi
        echo '{"name": "caz-tracker", "version": "1.0.0", "private": true, "dependencies": {}, "devDependencies": {}}' > package.json

    - name: Instalasi Modul Capacitor & Pembuat Logo
      run: |
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
        npm install -g @capacitor/assets

    - name: Konfigurasi & Pembuatan Struktur Android
      run: |
        echo '{"appId": "com.caz.location.app", "appName": "CAZ Tracker", "webDir": "www"}' > capacitor.config.json
        npx cap add android

    - name: Pasang Logo Kustom Keluarga CAZ 🚀
      run: |
        # Jika file icon.png terdeteksi di GitHub, mesin akan memprosesnya jadi logo APK
        if [ -f icon.png ]; then
          echo "Logo icon.png ditemukan! Memulai proses rendering logo..."
          mkdir -p assets
          cp icon.png assets/icon.png
          npx capacitor-assets generate --android
        else
          echo "INFO: File icon.png tidak ditemukan. Menggunakan logo default bawaan Capacitor."
        fi

    - name: Suntik Izin Akses GPS Latar Belakang (Metode Aman)
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        PERMISSIONS='    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n</manifest>'
        sed -i "s|<\/manifest>|${PERMISSIONS}|g" $MANIFEST_PATH
        npx cap sync android

    - name: Merakit File APK dengan Gradle Cloud
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Mengunggah File APK Resmi
      uses: actions/upload-artifact@v4
      with:
        name: CAZ-Tracker-Official-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
