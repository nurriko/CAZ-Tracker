name: Build Android APK Cloud (Live OTA Edition)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Inisialisasi Proyek & Aset Web
      run: |
        mkdir -p www
        if [ -f index.html ]; then
          cp index.html www/
        else
          echo "ERROR: File index.html tidak ditemukan!"
          exit 1
        fi
        echo '{"name": "caz-tracker", "version": "1.0.0", "private": true, "dependencies": {}, "devDependencies": {}}' > package.json

    - name: Instalasi Modul Capacitor & Pembuat Logo
      run: |
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
        npm install -g @capacitor/assets

    - name: Konfigurasi Live OTA Update & Struktur Android
      run: |
        # =========================================================================
        # PERHATIAN: GANTI TAUTAN DI BAWAH DENGAN LINK GITHUB PAGES APLIKASIMU!
        # Contoh: "https://nurriko.github.io/CAZ-tracker"
        # =========================================================================
        
        echo '{"appId": "com.caz.location.app", "appName": "CAZ Tracker", "webDir": "www", "server": {"url": "MASUKKAN_LINK_GITHUB_PAGES_KAMU_DISINI", "cleartext": true}}' > capacitor.config.json
        
        npx cap add android

    - name: Pasang Logo Kustom Keluarga CAZ
      run: |
        if [ -f icon.png ]; then
          mkdir -p assets
          cp icon.png assets/icon.png
          npx capacitor-assets generate --android
        fi

    - name: Suntik Izin Akses GPS Latar Belakang
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        PERMISSIONS='    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n</manifest>'
        sed -i "s|<\/manifest>|${PERMISSIONS}|g" $MANIFEST_PATH
        npx cap sync android

    - name: Merakit File APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Mengunggah File APK Resmi OTA
      uses: actions/upload-artifact@v4
      with:
        name: CAZ-Tracker-OTA-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
