name: Build Android APK Cloud

on:
  push:
    branches: [ main, master ] # Jalankan otomatis setiap ada commit baru di branch main/master
  workflow_dispatch: # Memungkinkan kamu menjalankan build secara manual kapan saja

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Inisialisasi Capacitor & Inject Background GPS
      run: |
        # 1. Siapkan folder web internal untuk pengemasan aplikasi
        mkdir -p www
        if [ -f index.html ]; then
          cp index.html www/
        fi

        # 2. Inisialisasi NPM dan install Core Capacitor Android
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android

        # 3. Buat file konfigurasi Capacitor secara otomatis tanpa prompt interaktif
        echo '{"appId": "com.caz.location.app", "appName": "CAZ Tracker", "webDir": "www", "bundledWebRuntime": false}' > capacitor.config.json

        # 4. Tambahkan platform Android asli ke dalam proyek
        npx cap add android

        # 5. Suntikkan Izin Akses GPS "Sepanjang Waktu" ke dalam file AndroidManifest.xml
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        PERMISSIONS="\n    <uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />\n    <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />\n    <uses-permission android:name=\"android.permission.ACCESS_BACKGROUND_LOCATION\" />"
        sed -i "/<\/manifest>/i \    $PERMISSIONS" $MANIFEST_PATH

        # 6. Singkronkan seluruh aset kode HTML ke dalam modul Android
        npx cap sync android

    - name: Merakit File APK dengan Gradle Cloud
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Mengunggah File APK Hasil Rakitan
      uses: actions/upload-artifact@v4
      with:
        name: CAZ-Tracker-Official-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
