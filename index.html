<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAZ Tracker - Family Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        /* CSS Utama & Tema Twilight */
        * { box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: #0b0f19; color: #f1f5f9; margin: 0; }
        .container { max-width: 440px; margin: auto; padding: 20px; }
        
        /* Notifikasi Chat Baru */
        .new-chat-badge { background: #ef4444; color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; }
        
        /* Efek Lucu Colek */
        .poke-animation { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        
        /* Stylings lainnya... (tetap pertahankan desain Twilight yang kamu suka) */
        .msg { padding: 10px; border-radius: 16px; margin: 5px; }
        .msg.sent { background: #3b82f6; align-self: flex-end; }
        .msg.received { background: #334155; align-self: flex-start; }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div id="dashboard-section" class="container">
        <!-- 1. CHAT GRUP & FITUR BARU -->
        <div id="tab-chat" class="tab-content active">
            <select id="chat-select-user">
                <option value="group_global">👪 Chat Semua Keluarga</option>
            </select>
            <div id="chat-box"></div>
            <!-- QUICK STATUS -->
            <div style="display:flex; gap:5px; overflow-x:auto;">
                <button class="btn-small" onclick="sendQuickStatus('OTW 🚗')">OTW 🚗</button>
                <button class="btn-small" onclick="sendQuickStatus('Sudah Sampai 🏠')">Sampai 🏠</button>
            </div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="chat-input" placeholder="Ketik pesan...">
                <button id="btn-send-chat">🚀</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script type="module">
        // ... (FIREBASE CONFIG & INITIALIZATION SAMA) ...

        // 2. SOLUSI PETA TIDAK BERGERAK:
        // Kita menggunakan setInterval untuk memaksa browser tetap sinkron dengan Firestore
        // meskipun aplikasi sedang di latar belakang.
        setInterval(async () => {
            if (auth.currentUser && myLatestLat) {
                // Update lokasi setiap 10 detik agar tetap 'hidup' di database
                await updateDoc(doc(db, "locations", auth.currentUser.uid), {
                    last_update: Date.now()
                });
            }
        }, 10000);

        // 3. FITUR NOTIFIKASI CHAT BARU
        // Kita menambah listener untuk koleksi chat, jika ada pesan masuk dan bukan dari kita, play bunyi!
        function listenToMessages(roomId) {
            onSnapshot(query(collection(db, "chats", roomId, "messages"), orderBy("timestamp", "asc")), (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const msg = change.doc.data();
                        if (msg.senderId !== auth.currentUser.uid) {
                            playCuteDing(); // Bunyi ting!
                            launchToast("Pesan baru di " + roomId.replace("group_global", "Grup Keluarga"), "success");
                        }
                    }
                });
                // ... (render chat logic)
            });
        }

        // 4. FITUR COLEK (PENGIRIMAN DATA COLEK)
        async function sendPoke(targetUid) {
            await addDoc(collection(db, "users", targetUid, "pokes"), {
                from: currentUserData.nama,
                timestamp: Date.now()
            });
            launchToast("Colekan terkirim!", "success");
        }

        // 5. FITUR STATUS KECEPATAN (LOGIKA MENGHITUNG JARAK PER WAKTU)
        // Tambahkan di dalam fungsi startLocationTracking:
        function getSpeedEmoji(speed) {
            if (speed < 0.5) return "🛌";
            if (speed < 3) return "🐢";
            return "🏎️";
        }

        // 6. GELAR PRESTASI MINGGUAN (Sederhana)
        // Kita bisa buat fungsi yang dipanggil seminggu sekali (atau saat login admin) 
        // untuk mengecek siapa yang paling aktif di Firestore.
    </script>
</body>
</html>
